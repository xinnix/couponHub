# Docker Compose for Production
# Usage: docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# 生产环境部署配置
# - 连接外部 PostgreSQL 数据库
# - 包含健康检查和自动重启
# - 日志和资源限制配置

version: "3.8"

services:
  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-couponHub}-api:${TAG:-latest}
    container_name: couponHub-api-prod
    env_file:
      - 1panel.env
    ports:
      - "${API_PORT:-3000}:3001"
    restart: unless-stopped
    networks:
      - couponHub-network
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-couponHub}-admin:${TAG:-latest}
    container_name: couponHub-admin-prod
    ports:
      - "${ADMIN_PORT:-80}:8080"
    depends_on:
      - api
    networks:
      - couponHub-network
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
networks:
  couponHub-network:
    driver: bridge
