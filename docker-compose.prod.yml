# Docker Compose for Production
# Usage: docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# 生产环境部署配置
# - 连接外部 PostgreSQL 数据库
# - 包含健康检查和自动重启
# - 日志和资源限制配置

version: "3.8"

services:
  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-couponhub}-api:${TAG:-latest}
    container_name: couponHub-api-prod
    env_file:
      - 1panel.env
    environment:
      # ===== 时区配置（关键修复）=====
      - TZ=Asia/Shanghai
    ports:
      - "${API_PORT:-3001}:3000"
    volumes:
      # 挂载微信支付证书文件
      # 将宿主机证书目录映射到容器内的 /app/certs
      # 确保 1panel.env 中的证书路径配置为：
      # WX_PAY_PRIVATE_KEY_PATH=/app/certs/apiclient_key.pem
      # WX_PAY_PUBLIC_KEY_PATH=/app/certs/wechatpay_public_key.pem
      - ./certs:/app/certs:ro
    restart: unless-stopped
    networks:
      - couponHub-network
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-couponhub}-admin:${TAG:-latest}
    container_name: couponHub-admin-prod
    env_file:
      - 1panel.env
    environment:
      # ===== 时区配置（关键修复）=====
      - TZ=Asia/Shanghai
    ports:
      - "${ADMIN_PORT:-8081}:80"
    depends_on:
      - api
    networks:
      - couponHub-network
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
networks:
  couponHub-network:
    driver: bridge
